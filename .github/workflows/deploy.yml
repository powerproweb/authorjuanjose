name: Deploy to BlueHost

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: bluehost-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Mirror to BlueHost
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Resolve deployment mode and settings
        id: deploy_vars
        env:
          BLUEHOST_HOST: ${{ secrets.BLUEHOST_HOST }}
          BLUEHOST_USER: ${{ secrets.BLUEHOST_USER }}
          BLUEHOST_SSH_KEY: ${{ secrets.BLUEHOST_SSH_KEY }}
          BLUEHOST_REMOTE_DIR: ${{ secrets.BLUEHOST_REMOTE_DIR }}
          SFTP_HOST: ${{ secrets.SFTP_HOST }}
          SFTP_USER: ${{ secrets.SFTP_USER }}
          SFTP_KEY: ${{ secrets.SFTP_KEY }}
          SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          trim() {
            printf '%s' "$1" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'
          }

          MODE=""
          HOST=""
          USER=""
          REMOTE_DIR=""
          SECONDARY_REMOTE_DIR=""

          S_HOST="$(trim "${BLUEHOST_HOST:-$SFTP_HOST}")"
          S_USER="$(trim "${BLUEHOST_USER:-$SFTP_USER}")"
          S_KEY="${BLUEHOST_SSH_KEY:-$SFTP_KEY}"
          S_REMOTE="$(trim "${BLUEHOST_REMOTE_DIR:-$SFTP_REMOTE_DIR}")"

          if [ -n "$S_HOST" ] && [ -n "$S_USER" ] && [ -n "$S_KEY" ]; then
            MODE="sftp"
            HOST="$S_HOST"
            USER="$S_USER"
            REMOTE_DIR="$S_REMOTE"

            case "$REMOTE_DIR" in
              /home/*/*)
                DIR_USER="${REMOTE_DIR#/home/}"
                DIR_USER="${DIR_USER%%/*}"
                if [ -n "$DIR_USER" ] && [ "$USER" != "$DIR_USER" ]; then
                  echo "::warning::Deployment user adjusted from remote directory path."
                  USER="$DIR_USER"
                fi
                ;;
            esac

            if [ -z "$REMOTE_DIR" ]; then
              REMOTE_DIR="/home/${USER}/public_html/authorjuanjose.io"
            fi

            mkdir -p ~/.ssh
            if printf '%s' "$S_KEY" | grep -q "BEGIN .*PRIVATE KEY"; then
              printf '%s' "$S_KEY" > ~/.ssh/deploy_key
            else
              if ! printf '%s' "$S_KEY" | base64 -d > ~/.ssh/deploy_key; then
                echo "::error::SFTP key secret is not valid key text or valid base64 data."
                exit 1
              fi
            fi
            sed -i 's/\r$//' ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            if ! ssh-keygen -lf ~/.ssh/deploy_key >/dev/null 2>&1; then
              echo "::error::SFTP key is invalid."
              exit 1
            fi
            ssh-keyscan -p 22 "$HOST" >> ~/.ssh/known_hosts
          fi

          if [ -z "$MODE" ]; then
            F_HOST="$(trim "${FTP_HOST:-}")"
            F_USER="$(trim "${FTP_USER:-}")"
            F_PASS="$(trim "${FTP_PASS:-}")"
            F_REMOTE="$(trim "${FTP_REMOTE_DIR:-}")"

            if [ -n "$F_HOST" ] && [ -n "$F_USER" ] && [ -n "$F_PASS" ]; then
              MODE="ftp"
              HOST="$F_HOST"
              USER="$F_USER"
              if [ -n "$F_REMOTE" ]; then
                REMOTE_DIR="$F_REMOTE"
              else
                REMOTE_DIR="/public_html/authorjuanjose.io"
              fi
            fi
          fi

          case "$REMOTE_DIR" in
            /public_html/authorjuanjose.io|/public_html/authorjuanjose.io/)
              SECONDARY_REMOTE_DIR="/public_html"
              ;;
            /home/*/public_html/authorjuanjose.io|/home/*/public_html/authorjuanjose.io/)
              SECONDARY_REMOTE_DIR="${REMOTE_DIR%/authorjuanjose.io}"
              SECONDARY_REMOTE_DIR="${SECONDARY_REMOTE_DIR%/}"
              ;;
          esac

          if [ "$SECONDARY_REMOTE_DIR" = "$REMOTE_DIR" ]; then
            SECONDARY_REMOTE_DIR=""
          fi

          if [ -z "$MODE" ]; then
            echo "::error::Missing deployment credentials. Configure SFTP secrets (BLUEHOST_* or SFTP_*) or FTP secrets (FTP_HOST, FTP_USER, FTP_PASS)."
            exit 1
          fi

          printf 'mode=%s\n' "$MODE" >> "$GITHUB_OUTPUT"
          printf 'host=%s\n' "$HOST" >> "$GITHUB_OUTPUT"
          printf 'user=%s\n' "$USER" >> "$GITHUB_OUTPUT"
          printf 'remote_dir=%s\n' "$REMOTE_DIR" >> "$GITHUB_OUTPUT"
          printf 'secondary_remote_dir=%s\n' "$SECONDARY_REMOTE_DIR" >> "$GITHUB_OUTPUT"

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Verify SFTP authentication
        if: ${{ steps.deploy_vars.outputs.mode == 'sftp' }}
        env:
          DEPLOY_HOST: ${{ steps.deploy_vars.outputs.host }}
          DEPLOY_USER: ${{ steps.deploy_vars.outputs.user }}
        run: |
          if ! timeout 30s sftp \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            -P 22 \
            -i ~/.ssh/deploy_key \
            "${DEPLOY_USER}@${DEPLOY_HOST}" <<'EOF'
            bye
          EOF
          then
            echo "::error::SFTP authentication failed."
            exit 1
          fi

      - name: Deploy via lftp SFTP mirror
        if: ${{ steps.deploy_vars.outputs.mode == 'sftp' }}
        env:
          DEPLOY_HOST: ${{ steps.deploy_vars.outputs.host }}
          DEPLOY_USER: ${{ steps.deploy_vars.outputs.user }}
          DEPLOY_REMOTE_DIR: ${{ steps.deploy_vars.outputs.remote_dir }}
          DEPLOY_SECONDARY_REMOTE_DIR: ${{ steps.deploy_vars.outputs.secondary_remote_dir }}
        run: |
          lftp -c "
            set sftp:auto-confirm yes
            set sftp:connect-program 'ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts -p 22 -q'
            set net:timeout 60
            set net:max-retries 3
            open -u \"${DEPLOY_USER},\" sftp://${DEPLOY_HOST}
            mirror --reverse --verbose --only-newer \
              --exclude-glob .git/ \
              --exclude-glob .github/ \
              --exclude-glob 01_md_plan_files/ \
              --exclude-glob .gitignore \
              --exclude-glob .gitattributes \
              --exclude-glob AGENTS.md \
              --exclude-glob README*.md \
              --exclude-glob forms/storage/ \
              --exclude-glob data/arc.sqlite \
              --exclude-glob '*.log' \
              ./ ${DEPLOY_REMOTE_DIR}/
            bye
          "

          if [ -n "${DEPLOY_SECONDARY_REMOTE_DIR}" ] && [ "${DEPLOY_SECONDARY_REMOTE_DIR}" != "${DEPLOY_REMOTE_DIR}" ]; then
            lftp -c "
              set sftp:auto-confirm yes
              set sftp:connect-program 'ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -o UserKnownHostsFile=~/.ssh/known_hosts -p 22 -q'
              set net:timeout 60
              set net:max-retries 3
              open -u \"${DEPLOY_USER},\" sftp://${DEPLOY_HOST}
              mirror --reverse --verbose --only-newer \
                --exclude-glob .git/ \
                --exclude-glob .github/ \
                --exclude-glob 01_md_plan_files/ \
                --exclude-glob .gitignore \
                --exclude-glob .gitattributes \
                --exclude-glob AGENTS.md \
                --exclude-glob README*.md \
                --exclude-glob forms/storage/ \
                --exclude-glob data/arc.sqlite \
                --exclude-glob '*.log' \
                ./ ${DEPLOY_SECONDARY_REMOTE_DIR}/
              bye
            "
          fi

      - name: Deploy via lftp FTP mirror
        if: ${{ steps.deploy_vars.outputs.mode == 'ftp' }}
        env:
          DEPLOY_HOST: ${{ steps.deploy_vars.outputs.host }}
          DEPLOY_USER: ${{ steps.deploy_vars.outputs.user }}
          DEPLOY_REMOTE_DIR: ${{ steps.deploy_vars.outputs.remote_dir }}
          DEPLOY_SECONDARY_REMOTE_DIR: ${{ steps.deploy_vars.outputs.secondary_remote_dir }}
          DEPLOY_FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -c "
            set net:timeout 60
            set net:max-retries 3
            set ftp:passive-mode true
            set ftp:ssl-allow true
            set ftp:ssl-force true
            set ftp:ssl-protect-data true
            set ssl:verify-certificate no
            open -u \"${DEPLOY_USER},${DEPLOY_FTP_PASS}\" ftp://${DEPLOY_HOST}
            mirror --reverse --verbose --only-newer \
              --exclude-glob .git/ \
              --exclude-glob .github/ \
              --exclude-glob 01_md_plan_files/ \
              --exclude-glob .gitignore \
              --exclude-glob .gitattributes \
              --exclude-glob AGENTS.md \
              --exclude-glob README*.md \
              --exclude-glob forms/storage/ \
              --exclude-glob data/arc.sqlite \
              --exclude-glob '*.log' \
              ./ ${DEPLOY_REMOTE_DIR}/
            bye
          "

          if [ -n "${DEPLOY_SECONDARY_REMOTE_DIR}" ] && [ "${DEPLOY_SECONDARY_REMOTE_DIR}" != "${DEPLOY_REMOTE_DIR}" ]; then
            lftp -c "
              set net:timeout 60
              set net:max-retries 3
              set ftp:passive-mode true
              set ftp:ssl-allow true
              set ftp:ssl-force true
              set ftp:ssl-protect-data true
              set ssl:verify-certificate no
              open -u \"${DEPLOY_USER},${DEPLOY_FTP_PASS}\" ftp://${DEPLOY_HOST}
              mirror --reverse --verbose --only-newer \
                --exclude-glob .git/ \
                --exclude-glob .github/ \
                --exclude-glob 01_md_plan_files/ \
                --exclude-glob .gitignore \
                --exclude-glob .gitattributes \
                --exclude-glob AGENTS.md \
                --exclude-glob README*.md \
                --exclude-glob forms/storage/ \
                --exclude-glob data/arc.sqlite \
                --exclude-glob '*.log' \
                ./ ${DEPLOY_SECONDARY_REMOTE_DIR}/
              bye
            "
          fi

      - name: Verify live site responds
        run: |
          status="$(curl -sS -o /dev/null -w "%{http_code}" --location "https://authorjuanjose.io/" || true)"
          if [ "$status" != "200" ]; then
            echo "::error::Live site check failed, expected HTTP 200 and got ${status:-unknown}."
            exit 1
          fi
          echo "Live site responded with HTTP 200."